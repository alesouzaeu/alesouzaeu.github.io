title: alesouzaeu - Data Science
description: Flexton is a responsive and ultra-minimal theme for Jekyll.
baseurl: "" # the subpath of your site, e.g. /blog
url: "flexton.netlify.com" # the base hostname & protocol for your site, e.g. http://example.com

# Author
author-name:    Alessandro Souza Eugenio
author-image:   1.jpg
author-job:     RH | DATA SCIENCE 
author-email:   sandrogenio@gmail.com # Add your email for contant form.
author-twitter: artemsheludko_ # Add your twitter account
about-author:   Profissional multidisciplinar, comunicador e gestor de pessoas. Com longa experiência em mídia e difusão. Dedicado a aplicar a cultura data-driven por onde passo. 


# Social settings
social-facebook:  alesouzaeu
social-github:    alesouzaeu
social-linkedin: alesouzaeu

# Newsletter
mailchimp: # Add your MailChimp form identifier. For example - blogenjoyfreedom.us16.list-manage.com/subscribe/post?u=cd56155d76ddeeb4c0bc4d080&amp;id=7a526cd13e

# Google Analytics
google-analytics: # Add your identifier. For example UA-99631805-1

# Comment Section (Disqus)
disqus-identifier: mr-brown # Add your shortname for Disqus Comment. For example mr-brown

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
plugins:
  - jekyll-paginate

paginate: 7
paginate_path: "/page/:num/"

include:
  - _pages

sass:
  sass_dir: _sass
  style: compressed

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
