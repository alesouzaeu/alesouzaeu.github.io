---
layout: default
---
{% include header.html %}
<div class="c-posts o-opacity">
  {% for category in site.categories %}
    <h2>{{ category[0] }}</h2>
    <ul>
      {% for post in category[1] %}
        <li><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></li>
      {% endfor %}
    </ul>
  {% endfor %}
</div> <!-- /.c-posts -->
